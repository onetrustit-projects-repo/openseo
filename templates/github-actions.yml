name: SEO Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  seo-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install OpenSEO CLI
        run: npm install -g @openseo/cli

      - name: Run SEO Audit
        run: |
          openseo audit --url ${{ secrets.PRODUCTION_URL }} --fail-on-warnings
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}

      - name: Check Robots.txt
        run: openseo check-robots --url ${{ secrets.PRODUCTION_URL }}

      - name: Check Canonical Tags
        run: openseo check-canonical --url ${{ secrets.PRODUCTION_URL }} --expected ${{ secrets.PRODUCTION_URL }}

      - name: Check Structured Data
        run: openseo check-structured-data --url ${{ secrets.PRODUCTION_URL }}

      - name: Check Core Web Vitals
        run: openseo check-vitals --url ${{ secrets.PRODUCTION_URL }}

      - name: Check Indexing Issues
        run: openseo check-indexing --url ${{ secrets.PRODUCTION_URL }}
