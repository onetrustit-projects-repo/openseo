<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }
    .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 16px; text-align: center; }
    .header h1 { font-size: 18px; font-weight: 700; color: white; }
    .header p { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 4px; }
    .content { padding: 16px; }
    .score-display { text-align: center; margin-bottom: 16px; }
    .score-value { font-size: 48px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .score-label { font-size: 12px; color: #64748b; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .stat { background: #1e293b; padding: 12px; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 18px; font-weight: 600; color: #6366f1; }
    .stat-label { font-size: 10px; color: #64748b; margin-top: 4px; }
    .keyword-section { margin-bottom: 16px; }
    .keyword-section label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 6px; }
    .keyword-section input { width: 100%; padding: 10px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 13px; }
    .keyword-section input:focus { outline: none; border-color: #6366f1; }
    .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; font-size: 13px; }
    .btn:hover { opacity: 0.9; }
    .footer { padding: 12px; border-top: 1px solid #1e293b; text-align: center; }
    .footer a { color: #6366f1; text-decoration: none; font-size: 11px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>OpenSEO</h1>
    <p>Inline SEO Recommendations</p>
  </div>
  <div class="content">
    <div class="score-display">
      <div class="score-value" id="score">--</div>
      <div class="score-label">Content Score</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-value" id="words">0</div><div class="stat-label">Words</div></div>
      <div class="stat"><div class="stat-value" id="density">0%</div><div class="stat-label">Keyword</div></div>
      <div class="stat"><div class="stat-value" id="readability">--</div><div class="stat-label">Readable</div></div>
      <div class="stat"><div class="stat-value" id="issues">0</div><div class="stat-label">Issues</div></div>
    </div>
    <div class="keyword-section">
      <label>Target Keyword:</label>
      <input type="text" id="keyword" placeholder="Enter keyword to track..." />
    </div>
    <button class="btn" id="analyzeBtn">Analyze Current Page</button>
  </div>
  <div class="footer">
    <a href="#" id="settingsLink">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
